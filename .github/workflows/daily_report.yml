name: TrendBot Multi-Asset Daily Run

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions: 
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar TrendBot Multi-Moedas
      env:
        EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
        EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
        EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        MOEDAS_ALVO: "bitcoin,ethereum,solana,cardano"
        DIAS_HISTORICO: "365"
      run: python trendbot_engine.py

    - name: Commit e Push do Dashboard (data.json e imagens)
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"        
        
        git config --global --add safe.directory /github/workspace

        git add data.json alerta_*.png
        git commit -m "update: dashboard data and charts [skip ci]" || echo "Sem mudanças"        
        
        git pull --rebase origin main
        git push origin main