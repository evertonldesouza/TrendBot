name: TrendBot Multi-Asset Daily Run

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions: 
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Commit e Push do Dashboard (data.json e imagens)
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"        
        
        git add data.json alerta_*.png        
        
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "update: dashboard data [skip ci]"
          git pull --rebase origin main
          git push origin main
        else
          echo "Sem mudanças detectadas nos dados. Pulando commit."
        fi