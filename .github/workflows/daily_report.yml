name: TrendBot Multi-Asset Daily Run

on:
  schedule:
    # Roda todos os dias às 13:00 UTC (10:00 da manhã no horário de Brasília)
    - cron: '0 13 * * *'
  workflow_dispatch: # Permite que você rode o bot manualmente pelo site do GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v3

    - name: Configurar Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar TrendBot Multi-Moedas
      env:
        # Puxando do Cofre (Secrets) para a memória do servidor
        EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
        EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
        EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        # Configurações extras (você pode mudar aqui direto)
        MOEDAS_ALVO: "bitcoin,ethereum,solana,cardano"
        DIAS_HISTORICO: "365"
      run: python trendbot_engine.py