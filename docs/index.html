<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendBot Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <h1><i class="fas fa-robot"></i> TrendBot Analytics</h1>
            <p>Última atualização: <span id="update-time">Carregando...</span></p>
        </div>
    </header>

    <main class="container">
        <div id="dashboard-grid" class="grid">
            <div class="loading">Buscando previsões da IA...</div>
        </div>
    </main>
    <section class="container historico-section">
        <h2>📈 Histórico de Previsões</h2>
        <div class="table-wrapper">
            <table id="historico-table">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Moeda</th>
                        <th>Previsão</th>
                        <th>Intervalo</th>
                        <th>Real</th>
                        <th>Erro</th>
                        <th>Acerto</th>
                    </tr>
                </thead>
                <tbody id="historico-body">
                    <tr><td colspan="7">Carregando histórico...</td></tr>
                </tbody>
            </table>
        </div>
    </section>
    <footer>
        <p>Desenvolvido por Everton L. de Souza &copy; 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
